<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invitation</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .screen {
      display: none;
      width: 100%;
    }

    .screen.active {
      display: block;
    }

    .card-wrap {
      display: flex;
      justify-content: center;
      padding: 1rem;
    }

    .invite-card {
      width: 100%;
      max-width: 460px;
      background: #f7ede0;
      border: 1px solid #c8a882;
      padding: 2rem;
      text-align: center;
    }

    .invite-title {
      font-size: 30px;
      margin: 10px 0;
    }

    .rsvp-btn, .submit-btn {
      width: 100%;
      padding: 12px;
      margin-top: 1rem;
      background: #6b4423;
      color: #fff;
      border: none;
      cursor: pointer;
    }

    .form-wrap {
      max-width: 400px;
      margin: auto;
      padding: 1rem;
    }

    .form-input {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
    }

    .att-btn {
      padding: 10px;
      width: 48%;
      cursor: pointer;
    }

    .attendance-row {
      display: flex;
      justify-content: space-between;
    }

    .error-msg {
      color: red;
      font-size: 13px;
    }

    @media (max-width:600px) {
      body {
        align-items: flex-start;
        padding-top: 20px;
      }
    }
  </style>
</head>

<body>

<!-- INVITE -->
<div class="screen active" id="screen-invite">
  <div class="card-wrap">
    <div class="invite-card">
      <h2>The Ncamane Family</h2>
      <div class="invite-title">Thanksgiving Gathering</div>
      <p>23 May 2026 · 12:00 PM</p>

      <button class="rsvp-btn" onclick="showScreen('screen-form')">RSVP</button>
    </div>
  </div>
</div>

<!-- FORM -->
<div class="screen" id="screen-form">
  <div class="form-wrap">
    <button onclick="showScreen('screen-invite')">← Back</button>

    <input class="form-input" id="fname" placeholder="First name">
    <input class="form-input" id="lname" placeholder="Surname">

    <div class="attendance-row">
      <button class="att-btn" onclick="selectAtt('yes')">Yes</button>
      <button class="att-btn" onclick="selectAtt('no')">No</button>
    </div>

    <div id="form-error" class="error-msg"></div>

    <button class="submit-btn" onclick="submitRSVP()">Submit</button>
  </div>
</div>

<!-- ADMIN LOGIN -->
<div class="screen" id="screen-admin-login">
  <div class="form-wrap">
    <button onclick="showScreen('screen-invite')">← Back</button>
    <input class="form-input" id="admin-pw" type="password" placeholder="Password">
    <button class="submit-btn" onclick="checkAdmin()">Enter</button>
  </div>
</div>

<!-- ADMIN -->
<div class="screen" id="screen-admin">
  <div class="form-wrap">
    <button onclick="showScreen('screen-invite')">← Back</button>
    <h3>Guest List</h3>
    <div id="list"></div>
  </div>
</div>

<script type="module">
  // ✅ CORRECT FIREBASE IMPORTS
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot, query, orderBy }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "YOUR_KEY",
    authDomain: "thanksgiving-rsvp-4762d.firebaseapp.com",
    projectId: "thanksgiving-rsvp-4762d"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let selAtt = null;

  window.showScreen = (id) => {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');

    if (id === 'screen-admin') loadAdmin();
  };

  window.selectAtt = (v) => {
    selAtt = v;
  };

  window.submitRSVP = async () => {
    const fn = document.getElementById('fname').value.trim();
    const ln = document.getElementById('lname').value.trim();
    const err = document.getElementById('form-error');

    if (!fn || !ln || !selAtt) {
      err.textContent = "Fill all fields";
      return;
    }

    await addDoc(collection(db, "rsvps"), {
      fname: fn,
      lname: ln,
      attending: selAtt,
      time: new Date().toISOString()
    });

    alert("Saved!");
    showScreen('screen-invite');
  };

  // ✅ ADMIN
  const PASS = "23May";

  window.checkAdmin = () => {
    const pw = document.getElementById('admin-pw').value;
    if (pw === PASS) showScreen('screen-admin');
    else alert("Wrong password");
  };

  function loadAdmin() {
    const q = query(collection(db, "rsvps"), orderBy("time", "desc"));

    onSnapshot(q, (snapshot) => {
      let html = "";

      snapshot.forEach(doc => {
        const e = doc.data();
        html += `<p>${e.fname} ${e.lname} - ${e.attending}</p>`;
      });

      document.getElementById('list').innerHTML = html || "No RSVPs yet";
    });
  }

  // ✅ SECRET ADMIN TAP
  let tap = 0;
  document.querySelector('.invite-title').addEventListener('click', () => {
    tap++;
    if (tap >= 2) showScreen('screen-admin-login');
    setTimeout(() => tap = 0, 1000);
  });

</script>

</body>
</html>
